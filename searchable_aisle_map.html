<!doctype html>
<html lang="en" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Searchable Store Aisle Map</title>
<style>
  :root { --bg:#f7f7f8; --panel:#fff; --ink:#111827; --muted:#6b7280; --line:#d1d5db; --target:#e11d48; --accent:#2563eb; --soft:#fff1f2; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:16px 18px; background:var(--panel); border-bottom:1px solid var(--line); display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  h1 { margin:0; font-size:22px; }
  .badge { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:var(--soft); color:#9f1239; border:1px solid #fecdd3; font-weight:800; min-width:92px; justify-content:center; }
  .layout { display:grid; grid-template-columns:340px 1fr; gap:16px; padding:16px; }
  aside, .mapCard { background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  aside { padding:16px; }
  .mapCard { overflow:hidden; min-height:78vh; }
  .searchRow { display:flex; gap:8px; margin:12px 0; }
  input { flex:1; min-width:0; border:2px solid #9ca3af; border-radius:12px; padding:12px; font-size:16px; font-weight:650; text-transform:uppercase; }
  button { border:1px solid var(--line); background:#fff; border-radius:10px; padding:10px 12px; cursor:pointer; font-size:14px; }
  button.primary { background:var(--accent); border-color:var(--accent); color:white; font-weight:800; }
  .toolbar { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:10px; border-bottom:1px solid var(--line); }
  #status { color:#374151; font-weight:650; }
  #mapWrap { width:100%; height:calc(78vh - 55px); overflow:hidden; }
  svg { width:100%; height:100%; display:block; background:linear-gradient(0deg,#fff,#fbfbfb); cursor:grab; touch-action:none; }
  svg:active { cursor:grabbing; }
  .aisle { fill:#9ca3af; opacity:.38; }
  .selectedDept { fill:#dbeafe; opacity:.92; stroke:#2563eb; stroke-width:7; stroke-dasharray:22 16; }
  .poi { fill:#111827; opacity:.78; }
  .label { font-size:30px; paint-order:stroke; stroke:white; stroke-width:8px; stroke-linejoin:round; fill:#111827; font-weight:750; }
  .smallLabel { font-size:23px; fill:#374151; font-weight:700; paint-order:stroke; stroke:white; stroke-width:7px; }
  .targetDot { fill:var(--target); stroke:white; stroke-width:16; filter:drop-shadow(0 3px 8px rgba(225,29,72,.45)); }
  .targetRing { fill:none; stroke:var(--target); stroke-width:10; stroke-dasharray:26 13; }
  .targetRing2 { fill:none; stroke:var(--target); stroke-width:5; opacity:.6; }
  .crosshair { stroke:var(--target); stroke-width:8; stroke-linecap:round; }
  .callout { font-size:46px; fill:#9f1239; font-weight:900; paint-order:stroke; stroke:white; stroke-width:12px; stroke-linejoin:round; }
  .arrow { stroke:var(--target); stroke-width:11; fill:none; marker-end:url(#arrowhead); }
  .note { line-height:1.45; color:#374151; }
  .details { margin-top:10px; padding:12px; border:1px solid #fecdd3; background:#fff1f2; border-radius:12px; }
  .nearby { margin-top:12px; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:6px; font-size:13px; }
  .nearby button { text-align:left; padding:7px; background:#f3f4f6; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .matches { margin-top:10px; max-height:180px; overflow:auto; border-top:1px solid #e5e7eb; padding-top:8px; }
  .matches button { margin:3px; padding:6px 8px; font-size:12px; }
  .hint { color:var(--muted); font-size:13px; }
  @media (max-width:900px) { .layout { grid-template-columns:1fr; } #mapWrap { height:70vh; } }
</style>

function normalize(v) {
  return String(v || '').trim().toUpperCase().replace(/\s+/g,'').replace(/-/g,'.').replace(/_/g,'.');
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function distance(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }

function drawDepartment(p) {

  const xs = same.map(q => q.x), ys = same.map(q => q.y);

  const r = document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',Math.min(...xs)-pad); r.setAttribute('y',Math.min(...ys)-pad);

}

function path(d,klass) {

function showMatches(q) {

  matchesEl.innerHTML = '<strong>Partial matches</strong><br>';
  for (const p of hits) {
    const b = document.createElement('button'); b.textContent = p.id; b.onclick = () => findAisle(p.id); matchesEl.appendChild(b);

function findAisle(raw) {

  search.value = id;

  const exact = byId.get(id);

  circle(exact.x, exact.y, 115, 'targetRing');
  line(exact.x-160, exact.y, exact.x-65, exact.y, 'crosshair');
  line(exact.x+65, exact.y, exact.x+160, exact.y, 'crosshair');
  line(exact.x, exact.y-160, exact.x, exact.y-65, 'crosshair');
  line(exact.x, exact.y+65, exact.x, exact.y+160, 'crosshair');
  circle(exact.x, exact.y, 34, 'targetDot');
  label(exact.x+60, exact.y+18, exact.id, 'label');
  label(exact.x-760, exact.y-430, `${exact.id} is here`, 'callout');
  path(`M ${exact.x-210} ${exact.y-355} C ${exact.x-110} ${exact.y-260}, ${exact.x-65} ${exact.y-170}, ${exact.x-18} ${exact.y-55}`, 'arrow');
  const w = 1900, h = 1300; setView(exact.x-w/2, exact.y-h/2, w, h);
  details.innerHTML = `<strong>${esc(exact.id)}</strong><br>x=${exact.x}, y=${exact.y}<br>deptId=${exact.deptId}<br><span class="hint">Highlighted with a red pin, double ring, crosshair, and department bounding area.</span>`;
  nearbyEl.innerHTML = '';
  for (const p of near) {
    const b = document.createElement('button'); b.textContent = `${p.id} · ${Math.round(p.d)}`; b.onclick = () => findAisle(p.id); nearbyEl.appendChild(b);
  }
  matchesEl.innerHTML = '';
}
